<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0e14"/>
  
  <!-- Matrix Green Glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00FF41;stop-opacity:0" />
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  
  <!-- Signal Waves (representing network resilience) -->
  <path d="M 256 200 Q 300 220 300 256 Q 300 292 256 312" 
        stroke="#00FF41" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 256 160 Q 340 200 340 256 Q 340 312 256 352" 
        stroke="#00FF41" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 256 120 Q 380 180 380 256 Q 380 332 256 392" 
        stroke="#00FF41" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  
  <!-- AI Agent Circle (center) -->
  <circle cx="256" cy="256" r="40" fill="#00FF41"/>
  <circle cx="256" cy="256" r="30" fill="#0a0e14"/>
  
  <!-- SC Letters -->
  <text x="256" y="276" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#00FF41" text-anchor="middle">SC</text>
</svg>
