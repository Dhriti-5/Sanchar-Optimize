# AWS SAM Template for Sanchar-Optimize
# Production-grade serverless deployment with Lambda, API Gateway, DynamoDB, S3, Bedrock
# Cost-optimized for rural India and high-scale deployments

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Sanchar-Optimize: Agentic Content Resiliency System - Production Deployment'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Environment Configuration"
        Parameters:
          - EnvironmentName
          - AllowMockResponses
          - LogLevel
          - BedrockModelId
          - GeminiApiKey
          - GeminiModelId

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name (development/staging/production)
    AllowedValues:
      - development
      - staging
      - production

  AllowMockResponses:
    Type: String
    Default: 'false'
    Description: Allow mock responses when AWS services unavailable
    AllowedValues:
      - 'true'
      - 'false'

  LogLevel:
    Type: String
    Default: INFO
    Description: CloudWatch log level
    AllowedValues:
      - DEBUG
      - INFO
      - WARNING
      - ERROR

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock model ID used for AI generation

  GeminiApiKey:
    Type: String
    Default: ''
    NoEcho: true
    Description: Gemini API key for fallback provider

  GeminiModelId:
    Type: String
    Default: models/gemini-2.5-flash
    Description: Gemini model ID for fallback provider


Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 512
    Architectures:
      - x86_64
    EphemeralStorage:
      Size: 1024
    Environment:
      Variables:
        ENVIRONMENT: !Ref EnvironmentName
        LOG_LEVEL: !Ref LogLevel
        BEDROCK_ALLOW_MOCK_RESPONSES: !Ref AllowMockResponses
        BEDROCK_MODEL_ID: !Ref BedrockModelId
        GEMINI_API_KEY: !Ref GeminiApiKey
        GEMINI_MODEL_ID: !Ref GeminiModelId
        ALLOW_SYNTHETIC_CONTENT_FALLBACK: 'false'


Resources:

  # ============================================================================
  # API Gateway
  # ============================================================================

  SancharOptimizeApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'sanchar-optimize-api-${EnvironmentName}'
      StageName: !Sub '${EnvironmentName}'
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          ThrottlingBurstLimit: 5000
          ThrottlingRateLimit: 2000
      Cors:
        AllowMethods: "'GET, POST, PUT, DELETE, OPTIONS'"
        AllowHeaders: "'Content-Type, Authorization, X-Amz-Date, X-Api-Key'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: false


  # ============================================================================
  # Main Backend (FastAPI Application)
  # ============================================================================

  BackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'sanchar-optimize-backend-${EnvironmentName}'
      CodeUri: ../../
      Handler: app.lambda_handlers.backend.handler
      Description: FastAPI backend for Sanchar-Optimize
      Timeout: 60
      MemorySize: 1024
      EphemeralStorage:
        Size: 2048
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref ContentBucket
          DYNAMODB_SESSIONS_TABLE: !Sub 'sanchar-optimize-sessions-${EnvironmentName}'
          DYNAMODB_TRANSITIONS_TABLE: !Sub 'sanchar-optimize-transitions-${EnvironmentName}'
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref ContentBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionStateTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ContentCacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ModalityTransitionsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref SancharOptimizeApi
            Path: /{proxy+}
            Method: ANY


  # ============================================================================
  # Network Sentry Agent (Lambda)
  # ============================================================================

  NetworkSentryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'sanchar-optimize-network-sentry-${EnvironmentName}'
      CodeUri: ../../
      Handler: app.lambda_handlers.network_sentry.handler
      Description: Network Sentry Agent for signal drop prediction
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref SessionStateTable
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionStateTable
        - DynamoDBReadPolicy:
            TableName: !Ref ContentCacheTable
      Events:
        ScheduledInvoke:
          Type: Schedule
          Properties:
            Schedule: 'rate(1 minute)'


  # ============================================================================
  # Modality Orchestrator (Lambda)
  # ============================================================================

  ModalityOrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'sanchar-optimize-modality-orchestrator-${EnvironmentName}'
      CodeUri: ../../
      Handler: app.lambda_handlers.modality_orchestrator.handler
      Timeout: 10
      MemorySize: 512
      Description: Modality Orchestrator for AI-powered decisions
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          DYNAMODB_TABLE: !Ref SessionStateTable
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionStateTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel 
              Resource: '*'


  # ============================================================================
  # Multi-Modal Transformer (Lambda)
  # ============================================================================

  MultiModalTransformerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'sanchar-optimize-transformer-${EnvironmentName}'
      CodeUri: ../../
      Handler: app.lambda_handlers.transformer.handler
      Timeout: 30
      MemorySize: 1024
      EphemeralStorage:
        Size: 2048
      Description: Multi-Modal Transformer for content summarization
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref ContentBucket
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Policies:
        - AWSLambdaBasicExecutionRole
        - S3CrudPolicy:
            BucketName: !Ref ContentBucket
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'


  # ============================================================================
  # CloudWatch Alarms for Monitoring
  # ============================================================================

  BackendFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'sanchar-optimize-backend-errors-${EnvironmentName}'
      AlarmDescription: Backend Function Error Rate
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref BackendFunction
      TreatMissingData: notBreaching

  BackendFunctionThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'sanchar-optimize-backend-throttles-${EnvironmentName}'
      AlarmDescription: Backend Function Throttles
      MetricName: Throttles
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref BackendFunction
      TreatMissingData: notBreaching


  # ============================================================================
  # Data Storage: DynamoDB (Session State & Telemetry)
  # ============================================================================
  # Note: Telemetry data is stored in DynamoDB instead of Timestream to avoid
  # special access requirements. See app/aws/timestream_client.py for implementation.

  SessionStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'sanchar-optimize-sessions-${EnvironmentName}'
      BillingMode: PAY_PER_REQUEST  # Cost-optimized: pay only for actual requests
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: device_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: N
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: created_at
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: device-index
          KeySchema:
            - AttributeName: device_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName


  ContentCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'sanchar-optimize-cache-${EnvironmentName}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: content_id
          AttributeType: S
        - AttributeName: segment_start_time
          AttributeType: N
      KeySchema:
        - AttributeName: content_id
          KeyType: HASH
        - AttributeName: segment_start_time
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # Modality Transitions Table - tracks user modality switches
  ModalityTransitionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'sanchar-optimize-transitions-${EnvironmentName}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName


  # ============================================================================
  # Data Storage: S3 (Content Cache and Summaries)
  # ============================================================================

  ContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sanchar-optimize-content-${AWS::AccountId}-${EnvironmentName}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldCacheSummaries
            Status: Enabled
            ExpirationInDays: 7
            Prefix: cache/summaries/
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER
            Prefix: archive/
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName


  # ============================================================================
  # Lambda Execution Logs (CloudWatch)
  # ============================================================================

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/sanchar-optimize-${EnvironmentName}'
      RetentionInDays: 14


  # ============================================================================
  # CloudWatch Dashboard for Monitoring
  # ============================================================================

  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'sanchar-optimize-${EnvironmentName}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", { "stat": "Sum" } ],
                  [ ".", "Errors", { "stat": "Sum" } ],
                  [ ".", "Throttles", { "stat": "Sum" } ],
                  [ ".", "Duration", { "stat": "Average" } ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Lambda Metrics"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/ApiGateway", "Count", { "stat": "Sum" } ],
                  [ ".", "4XXError", { "stat": "Sum" } ],
                  [ ".", "5XXError", { "stat": "Sum" } ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "API Gateway Metrics"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/DynamoDB", "ConsumedWriteCapacityUnits", { "stat": "Sum" } ],
                  [ ".", "ConsumedReadCapacityUnits", { "stat": "Sum" } ],
                  [ ".", "UserErrors", { "stat": "Sum" } ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "DynamoDB Metrics"
              }
            }
          ]
        }


Outputs:

  # API Gateway
  ApiEndpoint:
    Description: Backend API Endpoint URL
    Value: !Sub 'https://${SancharOptimizeApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/'
    Export:
      Name: !Sub '${EnvironmentName}-ApiEndpoint'

  # Lambda Functions
  BackendFunctionArn:
    Description: Backend Lambda Function ARN
    Value: !GetAtt BackendFunction.Arn
    Export:
      Name: !Sub '${EnvironmentName}-BackendFunctionArn'

  NetworkSentryFunctionArn:
    Description: Network Sentry Lambda Function ARN
    Value: !GetAtt NetworkSentryFunction.Arn
    Export:
      Name: !Sub '${EnvironmentName}-NetworkSentryArn'

  ModalityOrchestratorFunctionArn:
    Description: Modality Orchestrator Lambda Function ARN
    Value: !GetAtt ModalityOrchestratorFunction.Arn
    Export:
      Name: !Sub '${EnvironmentName}-ModalityOrchestratorArn'

  TransformerFunctionArn:
    Description: Multi-Modal Transformer Lambda Function ARN
    Value: !GetAtt MultiModalTransformerFunction.Arn
    Export:
      Name: !Sub '${EnvironmentName}-TransformerArn'

  # Data Storage
  SessionStateTableName:
    Description: DynamoDB Session State Table Name
    Value: !Ref SessionStateTable
    Export:
      Name: !Sub '${EnvironmentName}-SessionStateTable'

  ContentCacheTableName:
    Description: DynamoDB Content Cache Table Name
    Value: !Ref ContentCacheTable
    Export:
      Name: !Sub '${EnvironmentName}-ContentCacheTable'

  ContentBucketName:
    Description: S3 Content Bucket Name
    Value: !Ref ContentBucket
    Export:
      Name: !Sub '${EnvironmentName}-ContentBucket'

  # Monitoring
  DashboardUrl:
    Description: CloudWatch Dashboard URL
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${MonitoringDashboard}'

  LogGroupName:
    Description: CloudWatch Log Group for Lambda Logs
    Value: !Ref LambdaLogGroup
    Export:
      Name: !Sub '${EnvironmentName}-LogGroupName'
